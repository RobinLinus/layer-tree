# Layer Tree Operator Configuration (single-operator dev mode)

[operator]
key_file = "./operator_key.bin"

[network]
chain = "regtest"

[listen]
user_addr = "127.0.0.1:8080"
peer_addr = "127.0.0.1:50051"

[peers]
urls = []
pubkeys = []

[database]
path = "./layer_tree.db"

[bitcoind]
rpc_url = "http://127.0.0.1:18443"
rpc_user = "rpcuser"
rpc_pass = "rpcpassword"

# Protocol params (defaults to regtest values if omitted)
# [params]
# fanout = 4
# kickoff_delay = 10
# nseq_start = 20
# step_size = 2
